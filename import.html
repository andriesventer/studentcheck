<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Enrolment Import</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: #f6f8fa;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 700px;
            margin: 40px auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 32px 24px;
        }
        h1 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 24px;
        }
        label {
            font-weight: 500;
            color: #4a5568;
            display: block;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 1rem;
        }
        button {
            background: #3182ce;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #2563eb;
        }
        .results {
            margin-top: 32px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
            text-align: left;
        }
        th {
            background: #f1f5f9;
            color: #2d3748;
        }
        .error {
            color: #e53e3e;
            font-weight: 500;
        }
        .success {
            color: #38a169;
            font-weight: 500;
        }
        @media (max-width: 600px) {
            .container {
                padding: 16px 8px;
            }
            th, td {
                padding: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Student Enrolment Import</h1>
        <form id="importForm">
            <label for="apiKey">API Key</label>
            <input type="text" id="apiKey" name="apiKey" placeholder="Enter your college API key" required>
            
            <label for="csvFile">CSV File</label>
            <input type="file" id="csvFile" name="csvFile" accept=".csv" required>
            
            <button type="submit">Import</button>
        </form>
        <div class="results" id="results"></div>
    </div>
    <script>
        console.log("Script loaded!");
        // Helper to parse CSV
        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const header = lines[0].split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                const values = line.split(',').map(v => v.trim());
                let obj = {};
                header.forEach((h, i) => obj[h] = values[i]);
                return obj;
            });
        }

        document.getElementById('importForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const apiKey = document.getElementById('apiKey').value.trim();
            const fileInput = document.getElementById('csvFile');
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            if (!apiKey) {
                resultsDiv.innerHTML = '<div class="error">API Key is required.</div>';
                return;
            }
            if (!fileInput.files.length) {
                resultsDiv.innerHTML = '<div class="error">Please select a CSV file.</div>';
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = async function(event) {
                const csvText = event.target.result;
                let records;
                try {
                    records = parseCSV(csvText);
                } catch {
                    resultsDiv.innerHTML = '<div class="error">Failed to parse CSV file.</div>';
                    return;
                }

                // Show loading
                resultsDiv.innerHTML = '<div>Processing records...</div>';

                // Table header
                let tableHTML = `<table>
                    <tr>
                        <th>IdNr</th>
                        <th>Cycle</th>
                        <th>ProgrammeCode</th>
                        <th>Enrolled</th>
                        <th>Status</th>
                        <th>Duplicated</th>
                    </tr>`;

                for (const rec of records) {
                    // Prepare payload
                    const payload = {
                        idnr: rec.idnr || rec.IdNr || rec.IDNR,
                        cycle_name: rec.cycle_name || rec.Cycle || rec.cycle || rec.CycleName,
                        programme_code: rec.programme_code || rec.ProgrammeCode || rec.programme || rec.Programme,
                        enrolled: rec.enrolled || rec.Enrolled || rec.enrolment || rec.Enrolment
                    };

                    let status = '';
                    let duplicated = '';
                    let rowClass = '';
                    try {
                        const response = await fetch('https://studdup.tvet.org.za/enrolment-check', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-API-Key': apiKey
                            },
                            body: JSON.stringify(payload)
                        });
                        if (response.ok) {
                            const data = await response.json();
                            status = data.status || (data.error ? 'Error' : 'Unknown');
                            duplicated = (data.duplicated ? 'Yes' : 'No');
                            rowClass = data.duplicated ? 'error' : 'success';
                        } else {
                            status = 'HTTP ' + response.status;
                            duplicated = 'N/A';
                            rowClass = 'error';
                        }
                    } catch (err) {
                        status = 'Network Error';
                        duplicated = 'N/A';
                        rowClass = 'error';
                    }

                    tableHTML += `<tr class="${rowClass}">
                        <td>${payload.idnr || ''}</td>
                        <td>${payload.cycle_name || ''}</td>
                        <td>${payload.programme_code || ''}</td>
                        <td>${payload.enrolled || ''}</td>
                        <td>${status}</td>
                        <td>${duplicated}</td>
                    </tr>`;
                }
                tableHTML += '</table>';
                resultsDiv.innerHTML = tableHTML;
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
